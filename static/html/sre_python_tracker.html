<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>30 Days Python — SRE Mastery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #060b14;
    --surface:   #0d1623;
    --surface2:  #111d2e;
    --border:    #1a2e45;
    --green:     #00e87a;
    --green-dim: #00944d;
    --amber:     #f0a500;
    --red:       #ff4455;
    --blue:      #3b9eff;
    --text:      #c8d8ee;
    --muted:     #4a6080;
    --font-mono: 'JetBrains Mono', monospace;
    --font-head: 'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,232,122,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,232,122,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 24px 64px;
  }

  /* ── HEADER ─────────────────────────────── */
  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 40px;
    gap: 24px;
    flex-wrap: wrap;
  }

  .header-left {}

  .prompt-line {
    font-size: 11px;
    color: var(--green);
    letter-spacing: .1em;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .prompt-line::before {
    content: '▶';
    animation: blink 1.2s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  h1 {
    font-family: var(--font-head);
    font-size: clamp(28px, 5vw, 46px);
    font-weight: 800;
    line-height: 1.05;
    color: #fff;
    letter-spacing: -.02em;
  }
  h1 span { color: var(--green); }

  .subtitle {
    margin-top: 8px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: .05em;
  }

  /* ── STAT CARDS ──────────────────────────── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 36px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
  }
  .stat-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--green);
  }
  .stat-card.amber::after { background: var(--amber); }
  .stat-card.blue::after  { background: var(--blue); }
  .stat-card.red::after   { background: var(--red); }

  .stat-label {
    font-size: 10px;
    letter-spacing: .12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .stat-value {
    font-family: var(--font-head);
    font-size: 32px;
    font-weight: 800;
    color: #fff;
    line-height: 1;
  }
  .stat-value span { font-size: 14px; color: var(--muted); }

  /* ── MASTER PROGRESS BAR ─────────────────── */
  .master-progress {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
    margin-bottom: 36px;
  }
  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .progress-label {
    font-size: 11px;
    letter-spacing: .1em;
    color: var(--green);
    text-transform: uppercase;
  }
  .progress-pct {
    font-family: var(--font-head);
    font-size: 18px;
    font-weight: 700;
    color: #fff;
  }
  .bar-track {
    height: 8px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--green-dim), var(--green));
    transition: width .6s cubic-bezier(.4,0,.2,1);
    position: relative;
  }
  .bar-fill::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 24px;
    background: rgba(255,255,255,0.3);
    filter: blur(4px);
  }

  /* ── WEEK SECTIONS ───────────────────────── */
  .week-section {
    margin-bottom: 32px;
  }

  .week-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 14px;
  }
  .week-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .15em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 99px;
    border: 1px solid;
  }
  .week-tag.w1 { color: var(--green); border-color: var(--green-dim); background: rgba(0,232,122,.06); }
  .week-tag.w2 { color: var(--blue);  border-color: #1d5a99;           background: rgba(59,158,255,.06); }
  .week-tag.w3 { color: var(--amber); border-color: #8a5f00;           background: rgba(240,165,0,.06); }
  .week-tag.w4 { color: var(--red);   border-color: #882030;           background: rgba(255,68,85,.06); }

  .week-title {
    font-family: var(--font-head);
    font-size: 14px;
    font-weight: 700;
    color: #fff;
  }
  .week-sub {
    font-size: 11px;
    color: var(--muted);
  }

  .week-progress-inline {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--muted);
  }
  .week-mini-bar {
    width: 80px;
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .week-mini-fill {
    height: 100%;
    border-radius: 99px;
    transition: width .5s;
  }
  .w1 .week-mini-fill, .week-mini-fill.w1 { background: var(--green); }
  .w2 .week-mini-fill, .week-mini-fill.w2 { background: var(--blue); }
  .w3 .week-mini-fill, .week-mini-fill.w3 { background: var(--amber); }
  .w4 .week-mini-fill, .week-mini-fill.w4 { background: var(--red); }

  /* ── DAY GRID ────────────────────────────── */
  .day-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
  }

  .day-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all .2s;
    position: relative;
    overflow: hidden;
    user-select: none;
  }
  .day-card:hover {
    border-color: var(--muted);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,.4);
  }
  .day-card.done {
    border-color: var(--green-dim);
    background: rgba(0,232,122,.04);
  }
  .day-card.done::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--green);
  }
  .day-card.project {
    border-color: var(--amber);
    background: rgba(240,165,0,.04);
  }
  .day-card.project::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--amber);
  }
  .day-card.done.project::before { background: linear-gradient(90deg, var(--green), var(--amber)); }

  .day-num {
    font-size: 10px;
    letter-spacing: .1em;
    color: var(--muted);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .day-num .badge {
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 99px;
    background: rgba(240,165,0,.15);
    color: var(--amber);
    border: 1px solid rgba(240,165,0,.3);
  }
  .day-title {
    font-size: 12px;
    font-weight: 700;
    color: #d0e4f8;
    line-height: 1.35;
    margin-bottom: 6px;
  }
  .day-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .tag {
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 4px;
    background: rgba(255,255,255,.04);
    color: var(--muted);
    border: 1px solid var(--border);
    letter-spacing: .05em;
  }
  .done-check {
    position: absolute;
    top: 12px; right: 12px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--green);
    display: flex;align-items:center;justify-content:center;
    font-size: 10px;
    color: #000;
    font-weight: 900;
    opacity: 0;
    transform: scale(0);
    transition: all .3s cubic-bezier(.4,0,.2,1);
  }
  .done .done-check { opacity: 1; transform: scale(1); }

  /* ── SKILLS STRIP ────────────────────────── */
  .skills-section {
    margin-top: 40px;
  }
  .section-title {
    font-size: 11px;
    letter-spacing: .15em;
    color: var(--green);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::before { content: '//'; color: var(--muted); }

  .skills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
  }
  .skill-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
  }
  .skill-icon { font-size: 16px; }
  .skill-info { flex: 1; min-width: 0; }
  .skill-name { font-size: 11px; color: var(--text); margin-bottom: 4px; }
  .skill-bar {
    height: 3px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .skill-bar-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--green-dim), var(--green));
    transition: width 1s .3s;
  }
  .skill-pct { font-size: 10px; color: var(--muted); min-width: 30px; text-align: right; }

  /* ── FOOTER ──────────────────────────────── */
  footer {
    margin-top: 48px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  footer .left { font-size: 11px; color: var(--muted); }
  .reset-btn {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 7px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all .2s;
    letter-spacing: .05em;
  }
  .reset-btn:hover { border-color: var(--red); color: var(--red); }

  /* scanline */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,.04) 2px,
      rgba(0,0,0,.04) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }
</style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <div class="prompt-line">sre@cloudcorp ~ python-mastery</div>
      <h1>30 Days<br><span>Python for SRE</span></h1>
      <div class="subtitle">Production-first · Hands-on · Interview-ready</div>
    </div>
  </header>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Days Done</div>
      <div class="stat-value" id="statDone">0 <span>/ 30</span></div>
    </div>
    <div class="stat-card amber">
      <div class="stat-label">Projects Built</div>
      <div class="stat-value" id="statProjects">0 <span>/ 5</span></div>
    </div>
    <div class="stat-card blue">
      <div class="stat-label">Week</div>
      <div class="stat-value" id="statWeek">1 <span>/ 4</span></div>
    </div>
    <div class="stat-card red">
      <div class="stat-label">Remaining</div>
      <div class="stat-value" id="statLeft">30</div>
    </div>
  </div>

  <!-- MASTER PROGRESS -->
  <div class="master-progress">
    <div class="progress-header">
      <div class="progress-label">Overall Progress</div>
      <div class="progress-pct" id="masterPct">0%</div>
    </div>
    <div class="bar-track">
      <div class="bar-fill" id="masterBar" style="width:0%"></div>
    </div>
  </div>

  <!-- WEEKS -->
  <div id="weeksContainer"></div>

  <!-- SKILLS -->
  <div class="skills-section">
    <div class="section-title">Skills Unlocked</div>
    <div class="skills-grid" id="skillsGrid"></div>
  </div>

  <footer>
    <div class="left">Click any day card to mark complete · Progress saved locally</div>
    <button class="reset-btn" onclick="resetAll()">↺ Reset Progress</button>
  </footer>

</div>

<script>
const DAYS = [
  // Week 1
  { day:1,  title:'Log Analyzer',               tags:['file-io','loops','counters'],    project:false },
  { day:2,  title:'Service Health Checker',     tags:['requests','http','uptime'],      project:false },
  { day:3,  title:'Retry Logic',                tags:['exceptions','timeouts','retry'], project:false },
  { day:4,  title:'Parse JSON Logs',            tags:['json','parsing','fields'],       project:false },
  { day:5,  title:'Parse YAML Config',          tags:['pyyaml','k8s-style','config'],   project:false },
  { day:6,  title:'Build CLI Tool',             tags:['argparse','cli','flags'],        project:false },
  { day:7,  title:'🔥 Mini Project #1',         tags:['log-analyzer','cli','alerts'],   project:true  },
  // Week 2
  { day:8,  title:'REST API — GET Requests',    tags:['requests','rest','json'],        project:false },
  { day:9,  title:'POST Requests + Triggers',   tags:['post','payload','deploy'],       project:false },
  { day:10, title:'Auth APIs — Tokens',         tags:['headers','auth','bearer'],       project:false },
  { day:11, title:'Health Dashboard CLI',       tags:['multi-url','status','cli'],      project:false },
  { day:12, title:'Parallel API Calls',         tags:['concurrent','futures','speed'],  project:false },
  { day:13, title:'Logging Module',             tags:['logging','handlers','levels'],   project:false },
  { day:14, title:'🔥 Mini Project #2',         tags:['health-monitor','retry','alert'],project:true  },
  // Week 3
  { day:15, title:'boto3 Setup + List EC2',     tags:['aws','boto3','ec2'],             project:false },
  { day:16, title:'Start/Stop EC2 Instances',   tags:['aws','automation','state'],      project:false },
  { day:17, title:'CloudWatch Metrics',         tags:['cloudwatch','metrics','aws'],    project:false },
  { day:18, title:'AWS Cost Explorer Script',   tags:['cost','billing','optimization'], project:false },
  { day:19, title:'kubectl via Python',         tags:['subprocess','k8s','kubectl'],    project:false },
  { day:20, title:'Get Pod Status',             tags:['k8s','pods','status'],           project:false },
  { day:21, title:'Detect + Restart Failed Pods',tags:['crashloop','heal','k8s'],      project:false },
  { day:22, title:'🔥 Mini Project #3',         tags:['k8s-auto-healer','crashloop'],  project:true  },
  // Week 4
  { day:23, title:'Scheduling & Cron Jobs',     tags:['schedule','cron','automation'],  project:false },
  { day:24, title:'Slack / Email Alerts',       tags:['alerts','slack','webhook'],      project:false },
  { day:25, title:'Advanced Error Handling',    tags:['retries','backoff','robust'],    project:false },
  { day:26, title:'Config-Driven Scripts',      tags:['env','dotenv','config'],         project:false },
  { day:27, title:'Modular Code + Packaging',   tags:['modules','clean-code','pkg'],    project:false },
  { day:28, title:'Dockerize Python Script',    tags:['docker','container','deploy'],   project:false },
  { day:29, title:'🔥 Final SRE Tool',          tags:['full-stack','sre','automation'], project:true  },
  { day:30, title:'🎤 Interview + Mock Day',    tags:['interview','confidence','review'],project:true },
];

const WEEKS = [
  { num:1, cls:'w1', label:'Week 1', title:'Core Automation', sub:'Logs · Files · Debugging', days:[1,2,3,4,5,6,7] },
  { num:2, cls:'w2', label:'Week 2', title:'API + Automation', sub:'REST · Auth · Health Checks', days:[8,9,10,11,12,13,14] },
  { num:3, cls:'w3', label:'Week 3', title:'AWS + Kubernetes', sub:'boto3 · EC2 · Pod Healing', days:[15,16,17,18,19,20,21,22] },
  { num:4, cls:'w4', label:'Week 4', title:'Production-Ready', sub:'Alerts · Docker · Interview', days:[23,24,25,26,27,28,29,30] },
];

const SKILLS = [
  { icon:'📂', name:'File Handling & Log Parsing',  days:[1,4,7] },
  { icon:'🌐', name:'HTTP / REST APIs',              days:[2,8,9,10,11] },
  { icon:'⚙️', name:'Error Handling & Retries',     days:[3,25] },
  { icon:'📦', name:'JSON / YAML Parsing',           days:[4,5] },
  { icon:'🖥️', name:'CLI Tools (argparse)',          days:[6,7,11] },
  { icon:'☁️', name:'AWS / boto3 Automation',        days:[15,16,17,18] },
  { icon:'☸️', name:'Kubernetes Automation',         days:[19,20,21,22] },
  { icon:'📊', name:'Monitoring & Alerting',         days:[13,14,23,24] },
  { icon:'🐳', name:'Docker + Production Deploy',   days:[28,29] },
  { icon:'🎤', name:'Interview Confidence',          days:[30] },
];

// State
let done = new Set(JSON.parse(localStorage.getItem('sre30_done') || '[]'));

function save() { localStorage.setItem('sre30_done', JSON.stringify([...done])); }

function toggle(day) {
  done.has(day) ? done.delete(day) : done.add(day);
  save();
  render();
}

function resetAll() {
  if(confirm('Reset all progress?')) { done.clear(); save(); render(); }
}

function render() {
  const total = done.size;
  const pct = Math.round((total / 30) * 100);
  const projectsDone = DAYS.filter(d => d.project && done.has(d.day)).length;
  const curWeek = Math.min(4, Math.floor((total) / 7) + 1);

  document.getElementById('statDone').innerHTML     = `${total} <span>/ 30</span>`;
  document.getElementById('statProjects').innerHTML = `${projectsDone} <span>/ 5</span>`;
  document.getElementById('statWeek').innerHTML     = `${curWeek} <span>/ 4</span>`;
  document.getElementById('statLeft').textContent   = 30 - total;
  document.getElementById('masterPct').textContent  = pct + '%';
  document.getElementById('masterBar').style.width  = pct + '%';

  // Weeks
  const wc = document.getElementById('weeksContainer');
  wc.innerHTML = '';
  WEEKS.forEach(w => {
    const wDone = w.days.filter(d => done.has(d)).length;
    const wPct  = Math.round((wDone / w.days.length) * 100);

    const sec = document.createElement('div');
    sec.className = 'week-section';

    sec.innerHTML = `
      <div class="week-header">
        <div class="week-tag ${w.cls}">${w.label}</div>
        <div>
          <div class="week-title">${w.title}</div>
          <div class="week-sub">${w.sub}</div>
        </div>
        <div class="week-progress-inline">
          <div class="week-mini-bar"><div class="week-mini-fill ${w.cls}" style="width:${wPct}%"></div></div>
          <span>${wDone}/${w.days.length}</span>
        </div>
      </div>
      <div class="day-grid" id="grid-w${w.num}"></div>
    `;
    wc.appendChild(sec);

    const grid = sec.querySelector(`#grid-w${w.num}`);
    w.days.forEach(d => {
      const info = DAYS.find(x => x.day === d);
      const isDone = done.has(d);
      const card = document.createElement('div');
      card.className = `day-card${isDone ? ' done' : ''}${info.project ? ' project' : ''}`;
      card.onclick = () => toggle(d);
      card.innerHTML = `
        <div class="day-num">DAY ${String(d).padStart(2,'0')} ${info.project ? '<span class="badge">PROJECT</span>' : ''}</div>
        <div class="day-title">${info.title}</div>
        <div class="day-tags">${info.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
        <div class="done-check">✓</div>
      `;
      grid.appendChild(card);
    });
  });

  // Skills
  const sg = document.getElementById('skillsGrid');
  sg.innerHTML = '';
  SKILLS.forEach(s => {
    const unlockedDays = s.days.filter(d => done.has(d)).length;
    const pct = Math.round((unlockedDays / s.days.length) * 100);
    const el = document.createElement('div');
    el.className = 'skill-row';
    el.innerHTML = `
      <div class="skill-icon">${s.icon}</div>
      <div class="skill-info">
        <div class="skill-name">${s.name}</div>
        <div class="skill-bar"><div class="skill-bar-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="skill-pct">${pct}%</div>
    `;
    sg.appendChild(el);
  });
}

render();
</script>
</body>
</html>
