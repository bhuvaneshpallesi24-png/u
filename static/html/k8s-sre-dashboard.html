<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>K8s SRE Mastery — 20 Day Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07090e;--bg1:#0b0f17;--bg2:#0e1420;--bg3:#121b28;--bg4:#16202f;--b1:#192638;--b2:#1f3048;--b3:#283d5a;--tx:#c4d6ea;--tx2:#6a8aaa;--tx3:#2e4a66;--green:#00e87a;--cyan:#00d4ff;--orange:#ff6b35;--yellow:#ffc53d;--red:#ff3d5a;--purple:#a855f7;--mono:'IBM Plex Mono',monospace;--head:'Space Grotesk',sans-serif}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:var(--mono);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,232,122,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,232,122,.018) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:0 14px 80px}
.hdr{padding:24px 0 18px;border-bottom:1px solid var(--b1);margin-bottom:14px;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:10px}
.live{display:inline-flex;align-items:center;gap:6px;font-size:9px;color:var(--green);letter-spacing:.18em;text-transform:uppercase;margin-bottom:7px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 1.3s ease infinite}
@keyframes blink{0%,100%{opacity:1;box-shadow:0 0 6px var(--green)}50%{opacity:.15;box-shadow:none}}
.hdr-l h1{font-family:var(--head);font-size:clamp(18px,4vw,30px);font-weight:800;letter-spacing:-.02em;color:#fff;line-height:1.1}
.hdr-l h1 em{color:var(--green);font-style:normal}
.hdr-l p{font-size:10.5px;color:var(--tx2);margin-top:4px}
.hdr-r{text-align:right}
.big-p{font-family:var(--head);font-size:clamp(36px,8vw,60px);font-weight:800;color:var(--green);line-height:1;text-shadow:0 0 40px rgba(0,232,122,.25)}
.big-l{font-size:8.5px;color:var(--tx2);letter-spacing:.15em;text-transform:uppercase;margin-top:2px}
.m-bar{height:3px;background:var(--b1);border-radius:2px;margin-top:6px;overflow:hidden;width:120px;margin-left:auto}
.m-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--cyan));border-radius:2px;transition:width .5s}
.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:14px}
@media(max-width:480px){.stats{grid-template-columns:repeat(3,1fr)}}
.sc{background:var(--bg2);border:1px solid var(--b1);border-radius:7px;padding:9px 10px;position:relative;overflow:hidden}
.sc::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--c,var(--green))}
.sv{font-family:var(--head);font-size:19px;font-weight:700;color:var(--c,var(--green));line-height:1}
.sl{font-size:7.5px;color:var(--tx2);text-transform:uppercase;letter-spacing:.1em;margin-top:3px}
/* PHASE JUMP TABS */
.ptabs{display:flex;gap:4px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px;scrollbar-width:none;position:sticky;top:0;z-index:100;background:var(--bg);padding-top:8px}
.ptabs::-webkit-scrollbar{display:none}
.ptab{display:flex;align-items:center;gap:6px;flex-shrink:0;background:var(--bg2);border:1px solid var(--b1);border-radius:7px;padding:7px 10px;cursor:pointer;transition:all .15s;font-family:var(--mono);color:inherit;white-space:nowrap}
.ptab:hover{background:var(--bg3);border-color:var(--b2)}
.ptab.on{border-color:var(--pc,var(--green));background:var(--bg3);box-shadow:0 0 0 1px var(--pc,var(--green)) inset}
.ptab-ic{font-size:12px}
.ptab-n{font-size:10.5px;font-weight:600;color:var(--tx)}
.ptab-s{font-size:8px;color:var(--tx2);margin-top:1px}
.ptab-b{height:2px;background:var(--b1);border-radius:1px;margin-top:4px;overflow:hidden}
.ptab-f{height:100%;border-radius:1px;transition:width .3s}
/* PHASE SECTION */
.ph-section{margin-bottom:8px}
.ph-hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;padding:12px 14px;background:var(--bg2);border:1px solid;border-radius:9px;margin-bottom:8px}
.ph-hdr-l{display:flex;align-items:center;gap:10px}
.ph-ic{font-size:18px}
.ph-title{font-family:var(--head);font-size:14px;font-weight:700}
.ph-meta{font-size:9.5px;color:var(--tx2);margin-top:1px}
.ph-prog-wrap{display:flex;align-items:center;gap:8px}
.ph-prog-bar{width:120px;height:4px;background:var(--b1);border-radius:2px;overflow:hidden}
.ph-prog-fill{height:100%;border-radius:2px;transition:width .4s}
.ph-prog-pct{font-size:11px;font-weight:600;min-width:32px;text-align:right}
/* DAY CARDS */
.day-card{background:var(--bg2);border:1px solid var(--b1);border-radius:8px;margin-bottom:6px;overflow:hidden;transition:border-color .15s}
.day-card:hover{border-color:var(--b2)}
.day-card.fin{border-color:rgba(0,232,122,.3)}
.dh{display:grid;grid-template-columns:auto 1fr auto auto;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;user-select:none}
.dn{font-size:9px;font-weight:700;padding:3px 7px;border-radius:4px;background:var(--pc,var(--green));color:#05090d;white-space:nowrap;flex-shrink:0}
.di{min-width:0}
.dt{font-family:var(--head);font-size:12px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dg{font-size:9px;color:var(--tx2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dr{display:flex;align-items:center;gap:5px;flex-shrink:0}
.dp{font-size:9px;color:var(--tx2);min-width:22px;text-align:right}
.dc{font-size:9px;color:var(--tx3);transition:transform .2s;flex-shrink:0}
.day-card.open .dc{transform:rotate(90deg)}
.db{display:none;border-top:1px solid var(--b1)}
.day-card.open .db{display:block}
.chips{display:flex;flex-wrap:wrap;gap:3px;padding:6px 12px;background:rgba(0,0,0,.18);border-bottom:1px solid var(--b1)}
.chip{font-size:8px;padding:2px 6px;border-radius:3px;background:rgba(0,212,255,.07);color:var(--cyan);border:1px solid rgba(0,212,255,.13);white-space:nowrap}
.sec{padding:8px 12px}
.sec+.sec{border-top:1px solid var(--b1)}
.sec-lbl{font-size:7.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--tx3);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--b1)}
.tr{display:flex;align-items:flex-start;gap:7px;padding:4px 5px;border-radius:4px;cursor:pointer;transition:background .1s;margin-bottom:2px}
.tr:last-child{margin-bottom:0}
.tr:hover{background:var(--bg4)}
.ck{width:13px;height:13px;border:1.5px solid var(--b3);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;background:var(--bg1);transition:all .12s}
.tr.done .ck{background:var(--pc,var(--green));border-color:var(--pc,var(--green))}
.ck svg{display:none}
.tr.done .ck svg{display:block}
.tl{font-size:10.5px;color:var(--tx);line-height:1.6;flex:1}
.tr.done .tl{color:var(--tx3);text-decoration:line-through;text-decoration-color:var(--b3)}
.tag{font-size:7.5px;padding:2px 5px;border-radius:3px;flex-shrink:0;margin-top:2px;font-weight:500;white-space:nowrap}
.t-h{background:rgba(0,232,122,.1);color:var(--green);border:1px solid rgba(0,232,122,.18)}
.t-b{background:rgba(255,107,53,.1);color:var(--orange);border:1px solid rgba(255,107,53,.18)}
.t-l{background:rgba(0,212,255,.1);color:var(--cyan);border:1px solid rgba(0,212,255,.18)}
.t-d{background:rgba(255,61,90,.1);color:var(--red);border:1px solid rgba(255,61,90,.18)}
.t-i{background:rgba(255,197,61,.1);color:var(--yellow);border:1px solid rgba(255,197,61,.18)}
.t-p{background:rgba(168,85,247,.1);color:var(--purple);border:1px solid rgba(168,85,247,.18)}
.mbox{margin:0 12px 8px;padding:8px 10px;background:rgba(255,107,53,.06);border:1px solid rgba(255,107,53,.2);border-radius:6px;font-size:10px;color:var(--orange);line-height:1.6}
.mbox b{display:block;font-size:7.5px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px;opacity:.65}
#toast{position:fixed;bottom:16px;right:16px;z-index:9999;background:var(--bg3);border:1px solid var(--green);border-radius:7px;padding:9px 14px;font-size:10.5px;color:var(--green);display:flex;align-items:center;gap:6px;box-shadow:0 8px 32px rgba(0,0,0,.55);transform:translateY(70px);opacity:0;transition:all .28s;pointer-events:none}
#toast.show{transform:translateY(0);opacity:1}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg1)}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
</style>
</head>
<body>
<div class="app">
  <header class="hdr">
    <div class="hdr-l">
      <div class="live"><span class="dot"></span>LIVE PROGRESS</div>
      <h1>Kubernetes <em>SRE</em> Mastery</h1>
      <p>$ kubectl get expertise --level=production --watch</p>
    </div>
    <div class="hdr-r">
      <div class="big-p" id="bigP">0%</div>
      <div class="big-l">SRE Readiness</div>
      <div class="m-bar"><div class="m-fill" id="mFill" style="width:0"></div></div>
    </div>
  </header>
  <div class="stats" id="sRow"></div>
  <div class="ptabs" id="ptabs"></div>
  <div id="allDays"></div>
</div>
<div id="toast">&#10003; <span id="tMsg"></span></div>
<script>
const PH = [{"id": "p1", "icon": "🏗️", "name": "Core Architecture", "color": "#00e87a", "range": "Day 1–3", "days": [{"id": "d1", "n": 1, "title": "Control Plane Deep Dive", "goal": "Understand every component that makes K8s tick", "topics": ["Role of Master / Control Plane", "Kube API Server", "ETCD", "Kube Scheduler", "Controller Manager"], "secs": [{"l": "Step 1 — Install kubectl", "t": "t-h", "ts": ["Linux: curl -LO https://dl.k8s.io/release/.../kubectl  then chmod +x kubectl && sudo mv kubectl /usr/local/bin/", "Mac: brew install kubectl", "Verify: kubectl version --client  →  Client Version: v1.xx.x", "kubectl help — read the top-level command groups out loud"]}, {"l": "Step 2 — Install Minikube", "t": "t-h", "ts": ["Linux: curl -LO https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64", "sudo install minikube-linux-amd64 /usr/local/bin/minikube", "Mac: brew install minikube", "Verify Docker running first: docker ps (must show output)", "minikube version  →  verify install"]}, {"l": "Step 3 — Start Your First Cluster", "t": "t-h", "ts": ["minikube start --driver=docker --cpus=2 --memory=4g", "Watch output: pulling image → preparing K8s → configuring → done", "minikube status  →  host: Running, kubelet: Running, apiserver: Running", "kubectl cluster-info  →  note API server URL (https://127.0.0.1:PORT)", "kubectl get nodes  →  1 node STATUS=Ready", "kubectl get nodes -o wide  →  see IP, OS image, CONTAINER-RUNTIME"]}, {"l": "Step 4 — Explore Control Plane Pods", "t": "t-h", "ts": ["kubectl get pods -n kube-system  →  ALL control plane components run as pods", "Identify: etcd-minikube, kube-apiserver-minikube, kube-scheduler-minikube, kube-controller-manager-minikube", "kubectl describe pod kube-apiserver-minikube -n kube-system  →  read every flag carefully", "Note the --etcd-servers flag — API Server is wired directly to ETCD", "kubectl get componentstatuses  →  shows health of scheduler, controller-manager, etcd"]}, {"l": "Step 5 — API Server (The Gateway)", "t": "t-l", "ts": ["API Server = ONLY entry point. kubectl, kubelet, controllers ALL talk through it", "It validates + authenticates + authorizes every request, then writes to ETCD", "kubectl proxy --port=8001 &  →  expose API locally in background", "curl http://localhost:8001/api/v1/pods | python3 -m json.tool | head -40", "curl http://localhost:8001/apis  →  see all API groups (apps, batch, networking...)", "kill %1  →  stop proxy"]}, {"l": "Step 6 — ETCD (Source of Truth)", "t": "t-l", "ts": ["ETCD = distributed key-value store. ONLY persistent storage for all cluster state", "Every kubectl apply writes to ETCD. Every kubectl get reads from ETCD via API Server", "minikube ssh  →  enter the node", "docker ps | grep etcd  →  find etcd container ID", "docker exec -it <ETCD_ID> sh", "ETCDCTL_API=3 etcdctl get / --prefix --keys-only | head -30", "See paths: /registry/pods/default/... /registry/deployments/...", "exit  →  leave etcd,  exit  →  leave node"]}, {"l": "Step 7 — Kube Scheduler", "t": "t-l", "ts": ["Watches for pods where spec.nodeName is EMPTY (unscheduled pods)", "Phase 1 Filtering: which nodes CAN host this pod? (CPU/Memory/Taints/Affinity)", "Phase 2 Scoring: which filtered node is BEST? (most free resources wins)", "kubectl run sched-test --image=nginx", "kubectl get pod sched-test -o wide  →  see which node was chosen", "kubectl describe pod sched-test  →  read Events: 'Successfully assigned default/sched-test to minikube'", "kubectl delete pod sched-test"]}, {"l": "Step 8 — Controller Manager", "t": "t-l", "ts": ["Runs ~30 control loops: Deployment, ReplicaSet, Node, Endpoint, Job, etc.", "Each loop: WATCH current state → COMPARE with desired → ACT to fix gap", "Test bare pod (no controller): kubectl run bare --image=nginx", "kubectl delete pod bare --force  →  GONE forever (no controller to recreate)", "Test with Deployment: kubectl create deployment test-dep --image=nginx", "kubectl delete pod <test-dep-xxxx> --force", "kubectl get pods -w  →  ReplicaSet controller IMMEDIATELY recreates it", "kubectl delete deployment test-dep"]}, {"l": "Step 9 — Full Request Flow Trace", "t": "t-d", "ts": ["kubectl run nginx --image=nginx --dry-run=server -v=8 2>&1 | head -60", "Read: you see HTTPS PUT/GET requests going to the API Server URL", "kubectl run trace-pod --image=nginx", "kubectl describe pod trace-pod  →  READ Events section line by line", "Events: Scheduled → Pulling → Pulled → Created → Started", "FLOW: kubectl → APIServer(auth+validate) → ETCD(write) → Scheduler(assign node) → Kubelet(run container)", "kubectl delete pod trace-pod"]}, {"l": "Step 10 — Break It & Observe", "t": "t-b", "ts": ["minikube stop", "kubectl get nodes  →  'connection to server was refused' = API Server is DOWN", "kubectl get pods  →  same error. WITHOUT API SERVER NOTHING WORKS", "minikube start  →  wait ~60s until Ready", "kubectl delete pod kube-scheduler-minikube -n kube-system", "kubectl get pods -n kube-system -w  →  scheduler IMMEDIATELY recreates (Static Pod!)", "Static Pods managed by Kubelet from /etc/kubernetes/manifests/ — always restored"]}, {"l": "Interview Prep", "t": "t-i", "ts": ["Q: Walk through exactly what happens when kubectl apply -f deploy.yaml runs", "Q: ETCD goes down mid-deployment — what happens to existing pods? New pods?", "Q: Name 5 controllers inside Controller Manager and what each manages", "Q: Why is Scheduler a separate component from API Server?", "Q: What is a Static Pod? Why do control plane components use Static Pods?", "Q: How to back up ETCD in production? (etcdctl snapshot save /backup.db)"]}], "mistake": "Thinking kubectl talks directly to containers. kubectl ONLY talks to API Server → writes to ETCD → other components react. Everything is decoupled event-driven reconciliation."}, {"id": "d2", "n": 2, "title": "Node Components — Kubelet, CRI, Kube-Proxy", "goal": "Master what runs on every worker node", "topics": ["Kubelet", "Container Runtime (Docker/containerd)", "Kube Proxy", "CRI Interface"], "secs": [{"l": "Step 1 — Inspect the Node", "t": "t-h", "ts": ["kubectl get nodes -o wide  →  see INTERNAL-IP, OS-IMAGE, KERNEL-VERSION, CONTAINER-RUNTIME", "Note: CONTAINER-RUNTIME shows containerd (K8s 1.24+ removed dockershim — no more Docker!)", "kubectl describe node minikube  →  read ALL sections carefully", "Key sections: Conditions, Capacity, Allocatable, System Info, Non-terminated Pods", "Allocatable = Capacity minus OS/system reserved resources"]}, {"l": "Step 2 — Inspect Kubelet Process", "t": "t-h", "ts": ["minikube ssh  →  enter the node", "ps aux | grep kubelet  →  see kubelet process and ALL its startup flags", "Key flags: --config, --container-runtime-endpoint, --cluster-dns, --node-ip", "systemctl status kubelet  →  active/running status + recent logs", "cat /etc/kubernetes/kubelet.conf  →  how kubelet authenticates to API Server", "ls /etc/kubernetes/manifests/  →  Static Pod definitions live here", "exit"]}, {"l": "Step 3 — containerd via crictl", "t": "t-h", "ts": ["minikube ssh", "crictl info  →  container runtime info via CRI interface", "crictl ps  →  all running containers (lower level than kubectl get pods)", "crictl pods  →  all pod sandboxes including the pause/infra containers", "crictl images  →  all images pulled on this node", "Compare crictl ps count vs kubectl get pods -A count (should be similar)", "exit"]}, {"l": "Step 4 — Kube-Proxy + iptables", "t": "t-h", "ts": ["kubectl get pods -n kube-system | grep kube-proxy", "kubectl describe pod kube-proxy-xxx -n kube-system  →  see --proxy-mode flag (iptables or ipvs)", "minikube ssh", "sudo iptables -t nat -L KUBE-SERVICES | head -30  →  service routing rules", "Each line maps a service ClusterIP:Port to pod endpoints via DNAT rules", "sudo iptables -t nat -L KUBE-NODEPORTS  →  NodePort rules", "exit"]}, {"l": "Step 5 — Break Kubelet & Recover", "t": "t-b", "ts": ["kubectl run nginx --image=nginx  →  wait until Running", "minikube ssh → sudo systemctl stop kubelet → exit", "kubectl get nodes -w  →  node goes NotReady after ~40s (heartbeat stops)", "kubectl get pods  →  pod status becomes Unknown", "minikube ssh → sudo systemctl start kubelet → exit", "kubectl get nodes -w  →  recovers to Ready", "kubectl get pods  →  Running again", "kubectl delete pod nginx"]}, {"l": "Step 6 — CRI Deep Dive", "t": "t-l", "ts": ["CRI = Container Runtime Interface — standard gRPC API between Kubelet and any runtime", "Kubelet calls: RunPodSandbox, CreateContainer, StartContainer, StopContainer", "pause container holds the network namespace so other containers in the pod can join it", "kubectl run pause-demo --image=nginx", "minikube ssh", "crictl pods | grep pause-demo  →  see pod sandbox", "crictl ps | grep pause-demo  →  see nginx + pause containers", "exit && kubectl delete pod pause-demo"]}, {"l": "Interview Prep", "t": "t-i", "ts": ["Q: What is the difference between Docker and containerd?", "Q: kube-proxy — trace a packet from external client to a pod", "Q: If kubelet crashes, how long before the node shows NotReady?", "Q: What is the pause/infra container and what network role does it play?", "Q: iptables mode vs IPVS mode in kube-proxy — when to use IPVS?"]}], "mistake": "Assuming Docker is available on nodes. K8s 1.24 removed dockershim permanently. Use crictl for node-level container debugging, not docker commands."}, {"id": "d3", "n": 3, "title": "Pods — Core Object, Limitations, Multi-Container", "goal": "Master the atomic unit and its real boundaries", "topics": ["Pod", "Pod Limitations", "Multi-container Pods", "Init Containers", "Sidecar Pattern"], "secs": [{"l": "Step 1 — Create Pod Correctly", "t": "t-h", "ts": ["kubectl run nginx --image=nginx --dry-run=client -o yaml > pod.yaml", "cat pod.yaml  →  study every field: apiVersion, kind, metadata, spec", "Add resource requests and limits under spec.containers[0]:", "  resources: {requests: {memory: 64Mi, cpu: 250m}, limits: {memory: 128Mi, cpu: 500m}}", "kubectl apply -f pod.yaml", "kubectl get pod nginx  →  ContainerCreating → Running", "kubectl describe pod nginx  →  read Events, Conditions, resource limits section"]}, {"l": "Step 2 — Inspect Pod Internals", "t": "t-h", "ts": ["kubectl get pod nginx -o yaml  →  full spec + status (nodeName, podIP, phase, conditions)", "kubectl get pod nginx -o jsonpath=\"{.status.podIP}\"  →  extract just the pod IP", "kubectl exec -it nginx -- /bin/bash  →  shell into the running container", "cat /etc/hosts  →  see pod hostname and IP configured automatically", "curl localhost:80  →  nginx serving inside the container", "exit", "kubectl logs nginx  →  access logs", "kubectl logs nginx --previous  →  previous container logs (useful after crash)"]}, {"l": "Step 3 — Prove Pod Limitations", "t": "t-l", "ts": ["kubectl delete pod nginx  →  pod GONE forever (bare pods have NO self-healing)", "Cannot do rolling updates on a bare pod", "Cannot rollback a bare pod", "Cannot scale a bare pod to multiple replicas", "kubectl get pods  →  nginx is gone. Confirmed: bare pods are powerless", "This is WHY Deployment, ReplicaSet, StatefulSet exist — they manage pod lifecycle"]}, {"l": "Step 4 — Multi-Container Pod", "t": "t-h", "ts": ["Create multi-pod.yaml: main nginx + sidecar busybox sharing an emptyDir volume", "Both containers share the same network namespace (localhost between them)", "kubectl apply -f multi-pod.yaml", "kubectl exec -it multi-pod -c nginx -- /bin/bash  →  exec into nginx container", "kubectl exec -it multi-pod -c sidecar -- sh  →  exec into sidecar container", "From sidecar: curl localhost:80  →  reaches nginx via shared localhost!", "kubectl logs multi-pod -c nginx  →  nginx logs only", "kubectl logs multi-pod --all-containers  →  all container logs combined"]}, {"l": "Step 5 — Init Container Pod", "t": "t-h", "ts": ["Create init-pod.yaml: initContainer writes /data/config.txt, main container reads it", "kubectl apply -f init-pod.yaml", "kubectl get pods -w  →  watch states: Init:0/1 → PodInitializing → Running", "kubectl logs init-pod -c init-container  →  see init container output", "kubectl describe pod init-pod  →  init container completed, main container running", "Use case: wait for DB ready, download config, set file permissions before main starts"]}, {"l": "Step 6 — Break Pods Intentionally", "t": "t-b", "ts": ["kubectl run bad1 --image=nginx:BROKEN-TAG  →  watch ImagePullBackOff", "kubectl describe pod bad1  →  Events: Failed to pull image", "kubectl run bad2 --image=nginx --command -- /wrong-command  →  CrashLoopBackOff", "kubectl describe pod bad2  →  see exit code in Last State section", "Create pod with memory limit 10Mi → nginx OOMKilled when it tries to start", "kubectl describe pod oom  →  Last State: OOMKilled, Exit Code: 137", "kubectl delete pod bad1 bad2 oom"]}, {"l": "Interview Prep", "t": "t-i", "ts": ["Q: What are the limitations of bare pods? Why always wrap in Deployment?", "Q: How do two containers in a pod communicate? (shared localhost + network namespace)", "Q: What is the pause container and what network role does it play?", "Q: Init container vs sidecar container — key differences?", "Q: Exit Code 137 vs Exit Code 1 vs Exit Code 0 — what does each mean?"]}], "mistake": "Running production workloads as bare pods. They have ZERO self-healing, scaling, or update capabilities. Always use Deployment (stateless) or StatefulSet (stateful)."}]}, {"id": "p2", "icon": "⚡", "name": "Cluster Setup", "color": "#00d4ff", "range": "Day 4–5", "days": [{"id": "d4", "n": 4, "title": "Minikube + Single Node Cluster Mastery", "goal": "Master local K8s and understand full cluster anatomy", "topics": ["Minikube Introduction", "Single Node Cluster", "Kubectl Installation", "Kubeconfig + Contexts", "Addons"], "secs": [{"l": "Step 1 — Cluster Configuration", "t": "t-h", "ts": ["minikube start --driver=docker --cpus=4 --memory=8192 --kubernetes-version=v1.28.0", "minikube status  →  host, kubelet, apiserver all Running", "kubectl config view  →  full kubeconfig file (clusters, users, contexts)", "kubectl config get-contexts  →  list all available contexts", "kubectl config current-context  →  which context is currently active", "kubectl config use-context minikube  →  switch to minikube context"]}, {"l": "Step 2 — Enable Essential Addons", "t": "t-h", "ts": ["minikube addons list  →  all available addons with enabled/disabled status", "minikube addons enable metrics-server  →  needed for kubectl top and HPA", "minikube addons enable ingress  →  NGINX ingress controller", "minikube addons enable dashboard  →  K8s web UI", "kubectl get pods -n kube-system  →  see new metrics-server and ingress pods", "minikube tunnel &  →  run in separate terminal to expose LoadBalancer services"]}, {"l": "Step 3 — Deep Cluster Exploration", "t": "t-h", "ts": ["kubectl get all -A  →  EVERY resource in EVERY namespace", "kubectl api-resources  →  ALL resource types K8s supports with API group + namespace scope", "kubectl get namespaces  →  default, kube-system, kube-public, kube-node-lease", "kubectl get events -A --sort-by=.lastTimestamp  →  recent cluster activity", "kubectl explain pod.spec.containers  →  built-in field documentation", "kubectl get pods --field-selector=status.phase=Running -A  →  filter by field"]}, {"l": "Step 4 — kubectl Power Commands", "t": "t-h", "ts": ["kubectl explain deployment.spec.strategy  →  explore any field", "kubectl get pods -o json | jq '.items[0].metadata'  →  JSON querying", "kubectl get nodes -o jsonpath='{range .items[*]}{.metadata.name}{\"\\t\"}{.status.nodeInfo.kubeletVersion}{\"\\n\"}{end}'", "alias k=kubectl  →  add to ~/.bashrc for speed", "kubectl get pods --watch  →  live stream of pod changes", "kubectl diff -f deploy.yaml  →  preview what will change before applying"]}, {"l": "Step 5 — Multi-Cluster Contexts", "t": "t-l", "ts": ["kubectl config set-cluster my-cluster --server=https://1.2.3.4:6443", "kubectl config set-credentials my-user --token=<token>", "kubectl config set-context my-ctx --cluster=my-cluster --user=my-user", "kubectl config use-context my-ctx", "brew install kubectx  →  fast context/namespace switcher", "kubectx  →  list and switch contexts interactively", "kubens  →  list and switch namespaces interactively"]}, {"l": "Interview Prep", "t": "t-i", "ts": ["Q: How is minikube different from a real production cluster?", "Q: What is a kubeconfig context and how does multi-cluster access work?", "Q: What is kube-system vs kube-public vs kube-node-lease namespace?", "Q: How does kubectl authenticate to the API Server?"]}], "mistake": "Using minikube for production. Single-node, no HA, no real networking. Always test on real multi-node cluster (EKS/kops) before any production deployment."}, {"id": "d5", "n": 5, "title": "KOPS — Real Production Cluster on AWS", "goal": "Build a real HA multi-node cluster from scratch", "topics": ["Kops Introduction", "Kops Installation", "Cluster Creation using Kops", "Cluster Scaling"], "secs": [{"l": "Step 1 — Install kops + AWS Setup", "t": "t-h", "ts": ["curl -Lo kops https://github.com/kubernetes/kops/releases/latest/download/kops-linux-amd64", "chmod +x kops && sudo mv kops /usr/local/bin/", "kops version  →  verify installation", "aws configure  →  Access Key, Secret Key, Region ap-south-1, output json", "aws sts get-caller-identity  →  confirm AWS authentication works"]}, {"l": "Step 2 — Prepare S3 State Store", "t": "t-h", "ts": ["aws s3 mb s3://my-kops-state-store --region ap-south-1", "aws s3api put-bucket-versioning --bucket my-kops-state-store --versioning-configuration Status=Enabled", "export KOPS_STATE_STORE=s3://my-kops-state-store  →  add to ~/.bashrc", "export CLUSTER_NAME=dev.k8s.local  →  .local = gossip-based DNS (no Route53 needed)", "ssh-keygen -t rsa -b 4096 -f ~/.ssh/kops-key  →  for node SSH access"]}, {"l": "Step 3 — Create the Cluster", "t": "t-h", "ts": ["kops create cluster --name=$CLUSTER_NAME --cloud=aws --zones=ap-south-1a,ap-south-1b --node-count=2 --node-size=t3.medium --master-size=t3.medium --ssh-public-key=~/.ssh/kops-key.pub", "kops edit cluster $CLUSTER_NAME  →  review full YAML config in editor", "kops update cluster $CLUSTER_NAME --yes  →  CREATE all AWS resources (EC2, ASG, VPC, subnets)", "kops validate cluster --wait 15m  →  wait for all nodes to join", "kubectl get nodes  →  master + 2 worker nodes, all Ready"]}, {"l": "Step 4 — Scale the Cluster", "t": "t-h", "ts": ["kops get instancegroups  →  see all node groups", "kops edit ig nodes-ap-south-1a  →  change minSize and maxSize values", "kops update cluster --yes  →  apply instance group changes", "kops rolling-update cluster  →  safely rolling update nodes", "kubectl get nodes -w  →  watch new nodes join the cluster", "Scale back: reduce minSize/maxSize, kops update cluster --yes, watch termination"]}, {"l": "Step 5 — Break It: Simulate Node Failure", "t": "t-b", "ts": ["kubectl get pods -o wide  →  note which EC2 node a pod is running on", "Go to AWS EC2 console → TERMINATE that exact instance", "kubectl get nodes -w  →  node goes NotReady after ~20 seconds", "kubectl get pods -w  →  pods on that node go Terminating → rescheduled to healthy node", "ASG detects terminated instance, launches replacement automatically (~2-3 min)", "kops validate cluster  →  confirm cluster is healthy again"]}, {"l": "Interview Prep", "t": "t-i", "ts": ["Q: kops vs EKS vs kubeadm — when would you choose each?", "Q: What is stored in S3 for kops? What if you accidentally delete the bucket?", "Q: How do you safely upgrade a kops cluster to a new K8s version?", "Q: What is gossip-based DNS (.k8s.local) and when would you use Route53 instead?"]}], "mistake": "Not backing up the kops S3 state bucket or ETCD. Both are your cluster source of truth. Lose them = lose the cluster completely with no recovery."}]}, {"id": "p3", "icon": "🚀", "name": "Workloads", "color": "#ff6b35", "range": "Day 6–8", "days": [{"id": "d6", "n": 6, "title": "ReplicaSet + Labels & Selectors", "goal": "Understand workload primitives before Deployment", "topics": ["ReplicaSet & its Drawbacks", "Labels & Selectors"], "secs": [{"l": "Step 1 — Create ReplicaSet Manually", "t": "t-h", "ts": ["Write rs.yaml from scratch (do NOT use kubectl create shortcut):", "apiVersion: apps/v1, kind: ReplicaSet, spec.replicas: 3", "spec.selector.matchLabels: app: nginx-rs", "spec.template.metadata.labels: app: nginx-rs (must match selector!)", "spec.template.spec.containers: [{name: nginx, image: nginx:1.21}]", "kubectl apply -f rs.yaml", "kubectl get rs  →  DESIRED=3, CURRENT=3, READY=3"]}, {"l": "Step 2 — Observe Self-Healing", "t": "t-h", "ts": ["kubectl delete pod <one-pod-name>", "kubectl get pods -w  →  deleted pod terminates → new pod starts IMMEDIATELY", "ReplicaSet controller saw: current=2, desired=3 → created 1 new pod", "kubectl describe rs nginx-rs  →  see Events: 'Created pod nginx-rs-xxxxx'"]}, {"l": "Step 3 — Prove RS Limitations", "t": "t-b", "ts": ["kubectl set image rs/nginx-rs nginx=nginx:1.23", "kubectl get pods -o custom-columns=NAME:.metadata.name,IMAGE:.spec.containers[0].image", "STILL showing nginx:1.21 — existing pods are NOT updated!", "Only new pods would use the new image if old ones are deleted manually", "This proves: ReplicaSet has NO update strategy, NO rollback, NO versioning"]}, {"l": "Step 4 — Labels & Selectors in Depth", "t": "t-h", "ts": ["kubectl get pods --show-labels  →  see all labels on every pod", "kubectl get pods -l app=nginx-rs  →  filter by label selector", "kubectl label pod <pod-name> app=different  →  BREAK the selector!", "kubectl get pods  →  now 4 pods! RS sees only 2 matching, creates 1 new", "kubectl get pods --show-labels  →  the relabeled pod is now orphaned", "kubectl label pod <pod-name> app=nginx-rs  →  fix label, RS kills the extra pod", "kubectl delete rs nginx-rs"]}, {"l": "Step 5 — Labels vs Annotations", "t": "t-l", "ts": ["Labels: used for SELECTION by controllers, services, and kubectl filtering", "Annotations: metadata NOT used for selection — for tooling, docs, build info", "kubectl annotate pod <pod> git-sha=abc123 deployed-by=github-actions", "kubectl describe pod <pod>  →  see Annotations section", "kubectl get pods -l git-sha=abc123  →  ERROR: annotations are NOT selectable", "Use annotations for: build version, owner team, documentation URLs, tool config"]}, {"l": "Interview Prep", "t": "t-i", "ts": ["Q: What are the 3 main drawbacks of using ReplicaSet directly?", "Q: matchLabels vs matchExpressions in a selector — difference?", "Q: Labels vs Annotations — when to use each? Give 3 real examples", "Q: What happens if you break a pod label so it no longer matches its ReplicaSet?"]}], "mistake": "Managing ReplicaSets directly in production. Always use Deployments — they own and manage ReplicaSets AND add rolling updates + rollback + versioning on top."}, {"id": "d7", "n": 7, "title": "Deployment — Rolling Updates + Rollbacks", "goal": "Zero-downtime deploys and instant production rollbacks", "topics": ["Deployment", "Rolling Updates & Rollbacks"], "secs": [{"l": "Step 1 — Create Production Deployment", "t": "t-h", "ts": ["kubectl create deployment app --image=nginx:1.21 --replicas=4 --dry-run=client -o yaml > deploy.yaml", "Edit: add rollingUpdate strategy: maxSurge:1, maxUnavailable:0", "Add resource requests + labels (env: prod, version: v1)", "kubectl apply -f deploy.yaml", "kubectl get deployment app  →  READY=4/4, UP-TO-DATE=4, AVAILABLE=4", "kubectl get rs  →  one ReplicaSet created and owned by the Deployment"]}, {"l": "Step 2 — Perform Rolling Update", "t": "t-h", "ts": ["kubectl set image deployment/app nginx=nginx:1.23", "kubectl rollout status deployment/app  →  watch live: 'Waiting...' → 'successfully rolled out'", "kubectl get pods -w  →  see new pods (1.23) starting, old pods (1.21) terminating", "kubectl get rs  →  NOW 2 ReplicaSets: old (0 pods) + new (4 pods)", "kubectl rollout history deployment/app  →  see revision history", "kubectl annotate deployment app kubernetes.io/change-cause='upgraded to nginx 1.23'"]}, {"l": "Step 3 — Rollback from Bad Deploy", "t": "t-b", "ts": ["kubectl set image deployment/app nginx=nginx:THIS-DOES-NOT-EXIST", "kubectl rollout status  →  watch it HANG (maxUnavailable:0 means 4 old pods still serve!)", "kubectl get pods  →  new pods in ImagePullBackOff, 4 old pods still Running", "Service is still UP — maxUnavailable:0 saved you from downtime!", "kubectl rollout undo deployment/app  →  immediate rollback", "kubectl rollout status  →  watch rollback complete", "kubectl rollout undo deployment/app --to-revision=1  →  rollback to specific revision"]}, {"l": "Step 4 — Advanced Rollout Techniques", "t": "t-h", "ts": ["kubectl rollout pause deployment/app  →  pause for canary testing", "kubectl set image deployment/app nginx=nginx:1.25  →  update image while paused", "kubectl get pods  →  only some pods updated (controlled canary!)", "kubectl rollout resume deployment/app  →  continue rollout to all pods", "kubectl scale deployment app --replicas=8  →  scale up", "kubectl rollout history deployment/app  →  see all revisions"]}, {"l": "Step 5 — Understand Internals", "t": "t-l", "ts": ["Deployment creates RS V2 (0 replicas) when image changes", "Scales V2 +1 (maxSurge:1 allows 5 total pods)", "Waits for V2 pod to pass readiness, then scales V1 -1", "Repeats until V2=4 pods, V1=0 pods", "V1 ReplicaSet kept at 0 replicas to enable instant rollback", "kubectl get rs  →  see old RS exists with 0 desired replicas"]}, {"l": "Interview Prep", "t": "t-i", "ts": ["Q: How does rolling update work internally at the ReplicaSet level?", "Q: Recreate vs RollingUpdate strategy — when would you use Recreate?", "Q: maxSurge=25%, maxUnavailable=25% for 8 replicas — what does that mean exactly?", "Q: How do you implement a blue-green deployment in Kubernetes?", "Q: How do you implement a canary deployment using rollout pause/resume?"]}], "mistake": "Not setting maxUnavailable:0 when you have no readiness probes. K8s marks a pod available when the process starts, NOT when it is ready to serve traffic."}, {"id": "d8", "n": 8, "title": "DaemonSet — Node-Level Agent Deployment", "goal": "Run agents on every node in your fleet automatically", "topics": ["DaemonSet & its Drawbacks"], "secs": [{"l": "Step 1 — Explore Existing DaemonSets", "t": "t-h", "ts": ["kubectl get ds -A  →  ALL DaemonSets across all namespaces", "kubectl get ds -n kube-system  →  kube-proxy IS itself a DaemonSet!", "kubectl describe ds kube-proxy -n kube-system  →  read selector + pod template", "kubectl get pods -n kube-system -o wide | grep proxy  →  one pod per node confirmed", "This shows: kube-proxy runs on every node automatically via DaemonSet"]}, {"l": "Step 2 — Deploy Your Own DaemonSet", "t": "t-h", "ts": ["Create node-monitor-ds.yaml with node-exporter image (prometheus/node-exporter)", "Add tolerations to allow scheduling on control-plane/master nodes too", "kubectl apply -f node-monitor-ds.yaml", "kubectl get ds node-monitor  →  DESIRED=1, CURRENT=1, READY=1 (1-node cluster)", "kubectl get pods -o wide | grep node-monitor  →  confirm: scheduled on the node", "kubectl describe ds node-monitor  →  read Events, selector, update strategy"]}, {"l": "Step 3 — Taints and Tolerations", "t": "t-h", "ts": ["kubectl taint node minikube env=testing:NoSchedule  →  taint the node", "Create a new DaemonSet WITHOUT a toleration for this taint", "kubectl get pods  →  pod NOT scheduled (taint blocks it)", "kubectl describe pod <ds-pod>  →  Events: '0/1 nodes available: 1 node had untolerated taint'", "Edit DaemonSet: add toleration for env=testing:NoSchedule", "kubectl apply  →  pod now schedules on tainted node", "kubectl taint node minikube env=testing:NoSchedule-  →  remove taint"]}, {"l": "Step 4 — Update Strategy", "t": "t-h", "ts": ["kubectl get ds node-monitor -o yaml | grep -A3 updateStrategy", "Change updateStrategy to OnDelete — pods only update when manually deleted", "kubectl get pods  →  pods NOT updated automatically", "kubectl delete pod <ds-pod>  →  new pod with new image starts", "Change back to RollingUpdate (default): kubectl rollout status ds/node-monitor", "kubectl rollout history ds/node-monitor  →  see revision history"]}, {"l": "Real Use Cases + Drawbacks", "t": "t-l", "ts": ["Log collection: Fluentd/Filebeat DaemonSet tails logs from /var/log on every node", "Monitoring: node-exporter collects OS-level metrics per node", "Security: Falco DaemonSet monitors syscalls on every node for threats", "Networking: CNI plugin (Calico/Cilium) runs as DaemonSet to manage pod networking", "Drawback 1: Runs on ALL matching nodes — hard to run on just a subset", "Drawback 2: Hard to update without disrupting node-level work", "Drawback 3: Adds CPU/Memory overhead to every single node", "kubectl delete ds node-monitor"]}, {"l": "Interview Prep", "t": "t-i", "ts": ["Q: How is DaemonSet different from Deployment with replicas set to node count?", "Q: How do you schedule a DaemonSet only on nodes with a specific label?", "Q: What happens to a DaemonSet pod when a node is cordoned and drained?"]}], "mistake": "Using DaemonSet when you just need a fixed number of replicas. DaemonSet = node-level infrastructure agents. Deployment = application workloads."}]}, {"id": "p4", "icon": "🌐", "name": "Services & Networking", "color": "#a855f7", "range": "Day 9–11", "days": [{"id": "d9", "n": 9, "title": "All Service Types + Kube-Proxy Deep Dive", "goal": "Master every service type and their networking internals", "topics": ["Service in Kubernetes", "Types of Services", "ClusterIP", "NodePort", "LoadBalancer", "HostPort", "NodePort vs ClusterIP vs LoadBalancer", "Kube Proxy"], "secs": [{"l": "Step 1 — Why Services Exist", "t": "t-h", "ts": ["kubectl create deployment web --image=nginx --replicas=3", "kubectl get pods -o wide  →  note each pod has a unique IP", "kubectl exec -it <pod-1> -- curl <pod-2-IP>:80  →  direct pod-to-pod works", "But pod IPs change every time a pod restarts — you can't hardcode them", "Service = stable ClusterIP + DNS name in front of changing pod IPs"]}, {"l": "Step 2 — ClusterIP (Internal Only)", "t": "t-h", "ts": ["kubectl expose deployment web --type=ClusterIP --port=80 --name=web-cip", "kubectl get svc web-cip  →  note CLUSTER-IP (e.g. 10.96.x.x) — stable forever", "kubectl run debug --image=busybox --rm -it -- wget -qO- http://web-cip:80", "kubectl exec -it <any-pod> -- curl http://web-cip.default.svc.cluster.local", "kubectl get endpoints web-cip  →  see the 3 pod IPs behind the service", "Delete a pod → endpoints auto-update within ~1s"]}, {"l": "Step 3 — NodePort (External via Node)", "t": "t-h", "ts": ["kubectl expose deployment web --type=NodePort --port=80 --name=web-np", "kubectl get svc web-np  →  note NodePort in range 30000-32767", "NODE_IP=$(minikube ip)", "NODE_PORT=$(kubectl get svc web-np -o jsonpath='{.spec.ports[0].nodePort}')", "curl http://$NODE_IP:$NODE_PORT  →  access from outside cluster", "minikube ssh → sudo iptables -t nat -L KUBE-NODEPORTS | grep web → see iptables rule"]}, {"l": "Step 4 — LoadBalancer + HostPort", "t": "t-h", "ts": ["kubectl expose deployment web --type=LoadBalancer --port=80 --name=web-lb", "minikube tunnel &  →  run in separate terminal to get EXTERNAL-IP", "kubectl get svc web-lb -w  →  watch EXTERNAL-IP assigned", "curl http://<EXTERNAL-IP>:80  →  access via cloud load balancer", "HostPort: add hostPort:8080 to container spec → bypasses service, ties pod to node port", "curl http://$(minikube ip):8080  →  direct node access (dangerous in production!)"]}, {"l": "Step 5 — kube-proxy iptables Deep Dive", "t": "t-d", "ts": ["kubectl logs kube-proxy-xxx -n kube-system  →  see 'Syncing rules' messages", "minikube ssh", "sudo iptables -t nat -L KUBE-SERVICES | head -20  →  service VIP → chain mapping", "sudo iptables -t nat -L KUBE-SVC-XXXXX  →  per-service load balancing chain (round-robin)", "sudo iptables -t nat -L KUBE-SEP-XXXXX  →  per-endpoint DNAT rule to specific pod IP", "exit"]}, {"l": "Interview Prep", "t": "t-i", "ts": ["Q: ClusterIP vs NodePort vs LoadBalancer — exact use case and when NOT to use each", "Q: How does a Service with 3 pod endpoints load balance? (probabilistic iptables)", "Q: What is the risk of HostPort in production?", "Q: How fast does service routing update when a backend pod fails?", "Q: iptables mode vs IPVS mode in kube-proxy — key differences?"]}], "mistake": "Using NodePort for production external traffic. Use LoadBalancer or Ingress instead. NodePort exposes random high ports with no SSL, rate limiting, or routing rules."}, {"id": "d10", "n": 10, "title": "Ingress — Production Traffic Routing", "goal": "Domain routing, path routing, TLS termination in production", "topics": ["Ingress", "Ingress Controller vs Ingress Resource"], "secs": [{"l": "Step 1 — Install NGINX Ingress Controller", "t": "t-h", "ts": ["helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx && helm repo update", "helm install ingress-nginx ingress-nginx/ingress-nginx --namespace ingress-nginx --create-namespace", "kubectl get pods -n ingress-nginx -w  →  wait for controller pod Running", "kubectl get svc -n ingress-nginx  →  note EXTERNAL-IP of the ingress controller", "kubectl describe pod <controller-pod> -n ingress-nginx  →  read its configuration"]}, {"l": "Step 2 — Path-Based Routing", "t": "t-h", "ts": ["kubectl create deployment frontend --image=nginx --replicas=2", "kubectl expose deployment frontend --port=80 --name=frontend-svc", "kubectl create deployment backend --image=hashicorp/http-echo -- -text='backend!'", "kubectl expose deployment backend --port=5678 --name=backend-svc", "Create ingress-path.yaml: path / → frontend-svc:80, path /api → backend-svc:5678", "kubectl apply -f ingress-path.yaml", "curl http://<INGRESS-IP>/  →  frontend response", "curl http://<INGRESS-IP>/api  →  backend response"]}, {"l": "Step 3 — Host-Based Routing", "t": "t-h", "ts": ["Create ingress-host.yaml: host app.example.com → frontend, api.example.com → backend", "kubectl apply -f ingress-host.yaml", "echo '<INGRESS-IP> app.example.com api.example.com' | sudo tee -a /etc/hosts", "curl http://app.example.com  →  frontend", "curl http://api.example.com  →  backend", "kubectl describe ingress  →  see host-based rules configured"]}, {"l": "Step 4 — TLS Termination", "t": "t-h", "ts": ["openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout tls.key -out tls.crt -subj '/CN=app.example.com'", "kubectl create secret tls app-tls --cert=tls.crt --key=tls.key", "Add tls section to ingress YAML: secretName: app-tls, hosts: [app.example.com]", "kubectl apply -f ingress-tls.yaml", "curl -k https://app.example.com  →  HTTPS works (−k ignores self-signed cert)"]}, {"l": "Step 5 — Debug Ingress Issues", "t": "t-d", "ts": ["Wrong serviceName in Ingress → curl returns 503", "kubectl describe ingress  →  check Events section for errors", "kubectl logs -n ingress-nginx deploy/ingress-nginx-controller | tail -30", "No ADDRESS on ingress? → Ingress Controller not running or IngressClass mismatch", "kubectl get ingressclass  →  must exist and match spec.ingressClassName", "kubectl get endpoints  →  verify backend endpoints actually exist"]}, {"l": "Interview Prep", "t": "t-i", "ts": ["Q: What is the exact difference between Ingress Controller and Ingress resource?", "Q: How does TLS termination work at the Ingress level?", "Q: NGINX Ingress Controller vs AWS ALB Ingress Controller — architectural differences?", "Q: What happens when you apply an Ingress resource with no Controller installed?"]}], "mistake": "Creating Ingress resources without deploying an Ingress Controller first. The Ingress resource is just config data — the Controller pod does the actual traffic routing."}, {"id": "d11", "n": 11, "title": "Networking Deep Dive — DNS, NetworkPolicy, CNI", "goal": "Understand K8s networking from kernel level to pod level", "topics": ["Pod-to-Pod Networking", "DNS in Kubernetes", "NetworkPolicy", "CNI Plugins"], "secs": [{"l": "Step 1 — CoreDNS Deep Dive", "t": "t-h", "ts": ["kubectl get pods -n kube-system | grep coredns  →  CoreDNS pods", "kubectl describe cm coredns -n kube-system  →  view Corefile configuration", "kubectl run dns-test --image=busybox --rm -it -- sh", "nslookup kubernetes.default  →  resolves to ClusterIP of kubernetes service", "nslookup frontend-svc.default.svc.cluster.local  →  full DNS name", "nslookup frontend-svc.default  →  short form works within same cluster", "cat /etc/resolv.conf  →  see cluster DNS server IP configured in pod", "exit"]}, {"l": "Step 2 — Pod-to-Pod Networking", "t": "t-l", "ts": ["Every pod gets unique cluster-wide IP — NO NAT between pods (flat network)", "kubectl get pods -o wide  →  see each pod's IP address", "kubectl exec -it pod-A -- curl http://<pod-B-IP>  →  direct communication works", "CNI plugin (Flannel/Calico/Cilium) creates and manages this flat network", "kubectl get nodes -o jsonpath='{.items[0].spec.podCIDR}'  →  pod IP range per node"]}, {"l": "Step 3 — Headless Service", "t": "t-h", "ts": ["Create headless-svc.yaml: spec.clusterIP: None + selector matching pods", "kubectl apply -f headless-svc.yaml", "kubectl run dns-probe --image=busybox --rm -it -- sh", "nslookup headless-svc  →  returns ALL pod IPs directly (not a single VIP!)", "This is used by StatefulSets: pod-0.headless-svc.default.svc.cluster.local", "exit"]}, {"l": "Step 4 — NetworkPolicy: Deny All First", "t": "t-h", "ts": ["Create deny-all.yaml: podSelector: {}, policyTypes: [Ingress, Egress]", "kubectl apply -f deny-all.yaml  →  ALL traffic now blocked cluster-wide", "kubectl exec -it frontend-pod -- curl backend-svc:5678  →  NOW FAILS (timeout)", "This is zero-trust: deny everything by default, then allow what you need", "kubectl get netpol  →  see deny-all policy applied"]}, {"l": "Step 5 — Explicit Allow Rules", "t": "t-h", "ts": ["Create allow policy: allow ingress to backend ONLY from frontend pods on port 5678", "Create allow policy: allow ingress to frontend from anywhere on port 80", "kubectl apply -f allow-backend.yaml -f allow-frontend.yaml", "kubectl exec -it frontend-pod -- curl backend-svc:5678  →  NOW WORKS", "kubectl exec -it debug-pod -- curl backend-svc:5678  →  STILL FAILS (not whitelisted)", "Production pattern: deny-all + explicit allow per service communication"]}, {"l": "Interview Prep", "t": "t-i", "ts": ["Q: How does pod A in namespace X reach pod B in namespace Y?", "Q: What is a headless service and when do you need it vs ClusterIP?", "Q: How does NetworkPolicy work at the kernel level? What enforces it?", "Q: What is a CNI plugin? Name 3 popular ones and their key differences."]}], "mistake": "No NetworkPolicy means ALL pods can reach ALL other pods by default. In production: always apply deny-all first, then add explicit allow rules per service."}]}, {"id": "p5", "icon": "💾", "name": "Storage + Config + Security", "color": "#ffc53d", "range": "Day 12–14", "days": [{"id": "d12", "n": 12, "title": "Kubernetes Storage — Volumes, PV, PVC", "goal": "Persistent data that survives pod restarts and rescheduling", "topics": ["Kubernetes Volumes", "EmptyDir", "Persistent Volume (PV)", "Persistent Volume Claim (PVC)", "StorageClass"], "secs": [{"l": "Step 1 — EmptyDir Volume", "t": "t-h", "ts": ["Create emptydir-pod.yaml: 2 containers sharing emptyDir at /shared", "Container 'writer': writes /shared/data.txt every 5 seconds", "Container 'reader': reads and prints /shared/data.txt", "kubectl apply -f emptydir-pod.yaml", "kubectl logs emptydir-pod -c reader -f  →  see shared data flowing between containers", "kubectl delete pod emptydir-pod && kubectl apply -f emptydir-pod.yaml", "kubectl logs emptydir-pod -c reader  →  data GONE — emptyDir is ephemeral!"]}, {"l": "Step 2 — Create PersistentVolume", "t": "t-h", "ts": ["minikube ssh → sudo mkdir -p /mnt/data → exit  →  create directory on node", "Create pv.yaml: kind:PersistentVolume, hostPath:/mnt/data, capacity:1Gi, accessMode:ReadWriteOnce, reclaimPolicy:Retain", "kubectl apply -f pv.yaml", "kubectl get pv  →  STATUS=Available, RECLAIM POLICY=Retain", "kubectl describe pv my-pv  →  see capacity, access modes, host path"]}, {"l": "Step 3 — Create PVC and Bind", "t": "t-h", "ts": ["Create pvc.yaml: kind:PersistentVolumeClaim, requesting 1Gi ReadWriteOnce", "kubectl apply -f pvc.yaml", "kubectl get pvc  →  STATUS=Bound, VOLUME=my-pv (matched to our PV!)", "kubectl get pv  →  STATUS=Bound, CLAIM=default/my-pvc", "Create pod mounting PVC at /data", "kubectl exec -it pvc-pod -- sh -c 'echo persistent > /data/saved.txt'", "kubectl delete pod pvc-pod && kubectl apply -f pvc-pod.yaml  →  recreate pod", "kubectl exec -it pvc-pod -- cat /data/saved.txt  →  data PERSISTS across pod restarts!"]}, {"l": "Step 4 — Dynamic StorageClass", "t": "t-h", "ts": ["kubectl get storageclass  →  see default storage class (standard on minikube)", "Create dynamic-pvc.yaml: storageClassName: standard, requesting 500Mi", "kubectl apply -f dynamic-pvc.yaml", "kubectl get pvc  →  watch STATUS change Pending → Bound", "kubectl get pv  →  new PV AUTO-CREATED by the provisioner — no manual PV needed!", "In production: EBS/GCE-PD/EFS provisioners auto-create PVs on demand"]}, {"l": "Step 5 — Break Storage Scenarios", "t": "t-b", "ts": ["PVC requests 10Gi, PV only has 1Gi → PVC stays Pending (no match)", "kubectl describe pvc → 'no persistent volumes available for this claim'", "Request ReadWriteMany on a PV that only supports ReadWriteOnce → Pending (mode mismatch)", "Delete a Bound PV manually → PVC goes into Lost state, pod mount fails", "Retain policy: delete PVC → PV becomes Released (not Available — needs manual cleanup)"]}, {"l": "Interview Prep", "t": "t-i", "ts": ["Q: What happens to a PVC when the pod using it is deleted?", "Q: Retain vs Delete vs Recycle reclaim policy — when to use each?", "Q: Static provisioning vs Dynamic provisioning — when to use each?", "Q: ReadWriteOnce vs ReadWriteMany vs ReadOnlyMany — explain each with examples"]}], "mistake": "Using hostPath PVs in production. hostPath binds data to a specific node — if the pod reschedules to a different node, data is inaccessible. Use EBS, GCE-PD, or EFS."}, {"id": "d13", "n": 13, "title": "ConfigMaps + Secrets — Config Management", "goal": "Decouple all configuration and secrets from container images", "topics": ["ConfigMaps", "Secrets"], "secs": [{"l": "Step 1 — ConfigMap as Environment Vars", "t": "t-h", "ts": ["kubectl create configmap app-config --from-literal=ENV=production --from-literal=PORT=8080 --from-literal=LOG_LEVEL=info", "kubectl get configmap app-config -o yaml  →  see all key-value pairs", "Create deployment mounting app-config via envFrom.configMapRef", "kubectl apply -f deploy-with-cm.yaml", "kubectl exec -it <pod> -- env | grep -E 'ENV|PORT|LOG_LEVEL'  →  vars are set!"]}, {"l": "Step 2 — ConfigMap as Volume File", "t": "t-h", "ts": ["kubectl create configmap nginx-config --from-file=nginx.conf  →  file becomes a key", "Create pod with volume: configMap.name: nginx-config, mountPath: /etc/nginx/", "kubectl exec -it nginx-custom -- cat /etc/nginx/nginx.conf  →  config file in pod", "kubectl edit configmap nginx-config  →  change a value", "kubectl exec -it nginx-custom -- cat /etc/nginx/nginx.conf  →  file updates in ~60 seconds", "BUT env vars do NOT auto-update — pod needs restart for env var config changes"]}, {"l": "Step 3 — Create and Mount Secrets", "t": "t-h", "ts": ["kubectl create secret generic db-creds --from-literal=username=admin --from-literal=password=sup3rSecret", "kubectl get secret db-creds -o yaml  →  values are base64 encoded", "echo 'c3VwM3JTZWNyZXQ=' | base64 -d  →  decoded: sup3rSecret (NOT encrypted!)", "Mount as env vars: env.valueFrom.secretKeyRef.name + key", "kubectl exec -it <pod> -- env | grep -E 'DB_USER|DB_PASS'  →  secret values available"]}, {"l": "Step 4 — Secret as Volume + Rotation", "t": "t-h", "ts": ["Mount db-creds secret as volume at /etc/secrets/", "kubectl exec -it <pod> -- ls /etc/secrets  →  username and password as separate files", "kubectl exec -it <pod> -- cat /etc/secrets/password  →  secret value", "Rotate: kubectl create secret generic db-creds --from-literal=password=newPass --dry-run=client -o yaml | kubectl apply -f -", "kubectl rollout restart deployment/app  →  pods pick up new secret value"]}, {"l": "Step 5 — Break Config Scenarios", "t": "t-b", "ts": ["Reference non-existent ConfigMap key → pod gets CreateContainerConfigError", "kubectl describe pod → 'couldn\\'t find key WRONG_KEY in ConfigMap app-config'", "Wrong secret name: secretKeyRef.name: nonexistent → pod stays Pending", "kubectl describe pod → 'secret nonexistent not found'", "Fix both errors and watch pods start successfully"]}, {"l": "Interview Prep", "t": "t-i", "ts": ["Q: Why is base64 encoding in K8s Secrets NOT encryption?", "Q: How do you handle Secrets in GitOps without committing them to Git?", "Q: envFrom vs env.valueFrom vs volumeMount — when to use each?", "Q: How do you implement secret rotation with zero downtime?"]}], "mistake": "Committing base64-encoded Secrets to Git repositories. base64 is trivially decoded with one command. Use Sealed Secrets, External Secrets Operator, or HashiCorp Vault."}, {"id": "d14", "n": 14, "title": "RBAC + Namespaces + Resource Quotas", "goal": "Production isolation, least privilege, and resource governance", "topics": ["RBAC (Role-Based Access Control)", "Namespaces", "Resource Quotas"], "secs": [{"l": "Step 1 — Namespace Setup", "t": "t-h", "ts": ["kubectl create namespace dev", "kubectl create namespace staging", "kubectl create namespace prod", "kubectl get namespaces  →  see all 4 (default + 3 new)", "kubectl config set-context --current --namespace=dev  →  set default namespace", "kubectl get pods  →  only shows dev namespace pods (now empty)", "kubectl get pods --all-namespaces  →  see everything across all namespaces"]}, {"l": "Step 2 — Create ServiceAccount + RBAC", "t": "t-h", "ts": ["kubectl create serviceaccount ci-runner -n dev", "Create role.yaml: kind:Role in dev namespace, rules: get/list/watch on pods and deployments", "kubectl apply -f role.yaml", "Create rolebinding.yaml: bind ci-runner SA to the Role in dev namespace", "kubectl apply -f rolebinding.yaml", "kubectl auth can-i get pods --as=system:serviceaccount:dev:ci-runner -n dev  →  yes", "kubectl auth can-i delete pods --as=system:serviceaccount:dev:ci-runner -n dev  →  no", "kubectl auth can-i get pods --as=system:serviceaccount:dev:ci-runner -n prod  →  no"]}, {"l": "Step 3 — ClusterRole for Read-Only Access", "t": "t-h", "ts": ["Create clusterrole.yaml: ClusterRole with get/list/watch on ALL resources cluster-wide", "kubectl apply -f clusterrole.yaml", "Create clusterrolebinding: bind ops-team group to the ClusterRole", "kubectl apply -f crb.yaml", "kubectl auth can-i get pods --as=ops-user -n prod  →  yes (cluster-wide)", "kubectl auth can-i delete deployments --as=ops-user  →  no (read-only)"]}, {"l": "Step 4 — ResourceQuota", "t": "t-h", "ts": ["Create quota.yaml in dev: hard limits: pods:10, cpu:4, memory:8Gi, services:5", "kubectl apply -f quota.yaml", "kubectl describe quota -n dev  →  see Used vs Hard limits", "kubectl create deployment overload --image=nginx --replicas=11 -n dev", "kubectl get events -n dev  →  'exceeded quota: pods, requested:1, used:10, limited:10'", "kubectl scale deployment overload --replicas=3 -n dev  →  within quota now"]}, {"l": "Step 5 — LimitRange", "t": "t-h", "ts": ["Create limitrange.yaml: default cpu:100m memory:128Mi per container in dev", "kubectl apply -f limitrange.yaml", "kubectl run test-lr --image=nginx -n dev  →  no resource spec in YAML", "kubectl describe pod test-lr -n dev  →  see default requests automatically applied!", "kubectl describe limitrange -n dev  →  see default + max + min values", "kubectl delete pod test-lr -n dev"]}, {"l": "Interview Prep", "t": "t-i", "ts": ["Q: Role vs ClusterRole vs RoleBinding vs ClusterRoleBinding — full comparison", "Q: How would you give a GitHub Actions CI/CD pipeline least-privilege access?", "Q: ResourceQuota vs LimitRange — what does each control specifically?", "Q: What is the default ServiceAccount and what can it access by default?"]}], "mistake": "Giving CI/CD pipelines cluster-admin role. Always use least privilege: specific verbs (get, list), specific resources (pods), specific namespaces only."}]}, {"id": "p6", "icon": "🔥", "name": "Scaling + Probes + State", "color": "#ff3d5a", "range": "Day 15–17", "days": [{"id": "d15", "n": 15, "title": "Scaling — All Types, HPA, Proportional Scaling", "goal": "Auto-scale pods intelligently at every layer of your system", "topics": ["Scaling Pods", "Types of Scaling", "Deployment Scaling", "Proportional Scaling", "HPA (Horizontal Pod Autoscaler)"], "secs": [{"l": "Step 1 — Manual Scaling", "t": "t-h", "ts": ["kubectl create deployment scaletest --image=nginx --replicas=2", "kubectl get pods  →  2 pods running", "kubectl scale deployment scaletest --replicas=6", "kubectl get pods -w  →  watch 4 new pods start in parallel", "kubectl scale deployment scaletest --replicas=1", "kubectl get pods -w  →  watch 5 pods terminate gracefully (oldest first)", "Manual horizontal scaling: more replicas = more capacity"]}, {"l": "Step 2 — Enable Metrics Server", "t": "t-h", "ts": ["minikube addons enable metrics-server", "kubectl get pods -n kube-system | grep metrics  →  wait until Running (60-90s)", "kubectl top nodes  →  see CPU % and Memory usage per node", "kubectl top pods  →  see CPU and Memory per pod", "kubectl top pods -A  →  across all namespaces", "If metrics not showing: wait 60s for first collection then retry"]}, {"l": "Step 3 — Configure HPA", "t": "t-h", "ts": ["kubectl create deployment hpa-demo --image=nginx --replicas=2", "CRITICAL: add resource requests to deployment: cpu: 200m (HPA REQUIRES this!)", "kubectl autoscale deployment hpa-demo --cpu-percent=50 --min=2 --max=10", "kubectl get hpa  →  see TARGETS column showing <unknown>/50% initially", "kubectl describe hpa hpa-demo  →  read ScalingActive and AbleToScale conditions", "kubectl get hpa -w  →  watch TARGETS update as metrics populate (30-60s)"]}, {"l": "Step 4 — Load Test to Trigger HPA", "t": "t-b", "ts": ["Open terminal 2: kubectl get hpa -w  →  watch real-time scaling", "Terminal 1: kubectl run load --image=busybox --rm -it -- sh", "In shell: while true; do wget -q -O- http://hpa-demo; done", "Watch HPA: CPU % rises above 50 → HPA scales up pods → CPU drops", "kubectl get pods  →  pods scaling from 2 up to 10", "Ctrl+C load → wait 5 minutes → HPA scales back down to 2 (stabilization window)"]}, {"l": "Step 5 — Scaling Types Comparison", "t": "t-l", "ts": ["HPA (Horizontal Pod Autoscaler): scales pod REPLICAS based on CPU/Memory/custom metrics", "VPA (Vertical Pod Autoscaler): adjusts CPU/Memory REQUESTS on pods automatically", "Cluster Autoscaler: adds/removes NODES based on pending pods and utilization", "KEDA: event-driven autoscaling based on queue depth, Kafka lag, cron schedule", "Proportional scaling: when HPA scales 2→8, pods added proportionally to delta", "Scale-up: ~15-30s (fast); Scale-down: 5min stabilization window (slow, prevents thrashing)"]}, {"l": "Interview Prep", "t": "t-i", "ts": ["Q: What is the HPA scaling algorithm? desiredReplicas = ceil[current * (currentMetric/desiredMetric)]", "Q: Why MUST pods have resource requests set for HPA to work?", "Q: HPA vs VPA vs Cluster Autoscaler — what layer does each work at?", "Q: What is the HPA stabilization window and why does it exist?"]}], "mistake": "Enabling HPA without resource requests on pods. HPA calculates CPU% as (actual_usage / requested_cpu). No requests = undefined = HPA cannot make any scaling decision."}, {"id": "d16", "n": 16, "title": "Probes — Readiness, Liveness, Startup", "goal": "Prevent bad traffic to pods and enable automatic self-healing", "topics": ["What are Probes", "Use Cases of Probes", "Readiness Probe", "L let S={}, AP='p1';
const KEY='k8s_v6';
function loadS(){try{const v=localStorage.getItem(KEY);if(v)S=JSON.parse(v)}catch(e){S={}}}
function saveS(){try{localStorage.setItem(KEY,JSON.stringify(S))}catch(e){}}
function tid(d,s,i){return d+'||'+s+'||'+i}
function phC(p){let t=0,d=0;p.days.forEach(day=>day.secs.forEach(sec=>sec.ts.forEach((_,i)=>{t++;if(S[tid(day.id,sec.l,i)])d++;})));return{t,d}}
function allC(){let t=0,d=0;PH.forEach(p=>{const c=phC(p);t+=c.t;d+=c.d});return{t,d}}
function dayC(day){let t=0,d=0;day.secs.forEach(s=>s.ts.forEach((_,i)=>{t++;if(S[tid(day.id,s.l,i)])d++;}));return{t,d}}
function pct(d,t){return t?Math.round(d/t*100):0}
function doneD(){return PH.flatMap(p=>p.days).filter(d=>{const c=dayC(d);return c.t>0&&c.d===c.t}).length}

function stats(){
  const all=allC(), p=pct(all.d,all.t), dc=doneD();
  document.getElementById('bigP').textContent=p+'%';
  document.getElementById('mFill').style.width=p+'%';
  document.getElementById('sRow').innerHTML=`
    <div class="sc" style="--c:#00e87a"><div class="sv">${all.d}</div><div class="sl">Done</div></div>
    <div class="sc" style="--c:#ff3d5a"><div class="sv">${all.t-all.d}</div><div class="sl">Left</div></div>
    <div class="sc" style="--c:#00d4ff"><div class="sv">${dc}/20</div><div class="sl">Days</div></div>
    <div class="sc" style="--c:#ffc53d"><div class="sv">${20-dc}</div><div class="sl">Remaining</div></div>
    <div class="sc" style="--c:#a855f7"><div class="sv">${p}%</div><div class="sl">Ready</div></div>
    <div class="sc" style="--c:#ff6b35"><div class="sv">${all.t}</div><div class="sl">Total</div></div>`;
}

function buildAll(){
  let h='';
  PH.forEach(ph=>{
    const c=phC(ph), pp=pct(c.d,c.t);
    h+=`<div class="ph-section" id="${ph.id}">
      <div class="ph-hdr" style="border-color:${ph.color}22">
        <div class="ph-hdr-l">
          <span class="ph-ic">${ph.icon}</span>
          <div>
            <div class="ph-title" style="color:${ph.color}">${ph.name}</div>
            <div class="ph-meta">${ph.range} &nbsp;·&nbsp; ${c.d}/${c.t} tasks &nbsp;·&nbsp; ${pp}% complete</div>
          </div>
        </div>
        <div class="ph-prog-wrap">
          <div class="ph-prog-bar"><div class="ph-prog-fill" style="width:${pp}%;background:${ph.color}"></div></div>
          <div class="ph-prog-pct" style="color:${ph.color}">${pp}%</div>
        </div>
      </div>`;
    ph.days.forEach(day=>{
      const dc_=dayC(day), dp=pct(dc_.d,dc_.t);
      const done=dc_.t>0&&dc_.d===dc_.t;
      const C=2*Math.PI*11, off=C-(dp/100)*C;
      const isO=document.querySelector(`.day-card[data-id="${day.id}"]`)?.classList.contains('open')||false;
      h+=`<div class="day-card${done?' fin':''}${isO?' open':''}" data-id="${day.id}" style="--pc:${ph.color}">
        <div class="dh" onclick="toggleDay('${day.id}')">
          <div class="dn">Day ${day.n}</div>
          <div class="di">
            <div class="dt">${day.title}</div>
            <div class="dg">${day.goal}</div>
          </div>
          <div class="dr">
            <svg width="28" height="28" viewBox="0 0 28 28">
              <circle cx="14" cy="14" r="11" fill="none" stroke="var(--b2)" stroke-width="3.5"/>
              <circle cx="14" cy="14" r="11" fill="none" stroke="${ph.color}" stroke-width="3.5" stroke-linecap="round"
                stroke-dasharray="${C.toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}"
                transform="rotate(-90 14 14)"/>
            </svg>
            <div class="dp">${dp}%</div>
          </div>
          <div class="dc">&#9658;</div>
        </div>
        <div class="db">
          <div class="chips">${day.topics.map(t=>`<span class="chip">${t}</span>`).join('')}</div>
          ${day.secs.map(sec=>{
            const lbl=sec.t==='t-h'?'HANDS-ON':sec.t==='t-b'?'BREAK IT':sec.t==='t-d'?'DEBUG':sec.t==='t-i'?'INTERVIEW':sec.t==='t-p'?'PROJECT':'LEARN';
            return`<div class="sec">
              <div class="sec-lbl">${sec.l}</div>
              ${sec.ts.map((t,i)=>{
                const id=tid(day.id,sec.l,i), dk=!!S[id];
                return`<div class="tr${dk?' done':''}" onclick="toggleT('${id}')">
                  <div class="ck"><svg width="8" height="7" viewBox="0 0 8 7" fill="none"><path d="M1 3.2l2.2 2.3L7 1" stroke="${ph.color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
                  <div class="tl">${t}</div>
                  <div class="tag ${sec.t}">${lbl}</div>
                </div>`;
              }).join('')}
            </div>`;
          }).join('')}
          ${day.mistake?`<div class="mbox"><b>&#9888; Common Mistake</b>${day.mistake}</div>`:''}
        </div>
      </div>`;
    });
    h+='</div>';
  });
  document.getElementById('allDays').innerHTML=h;
}

function render(){stats();buildAll();}

function toggleDay(id){
  const el=document.querySelector(`.day-card[data-id="${id}"]`);
  if(el){el.classList.toggle('open');}
}

function scrollToPhase(id){
  const el=document.getElementById(id);
  if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('on'));
  const tab=document.querySelector(`.ptab[data-ph="${id}"]`);
  if(tab) tab.classList.add('on');
}

function buildTabs(){
  document.getElementById('ptabs').innerHTML=PH.map((ph,i)=>{
    const c=phC(ph), p_=pct(c.d,c.t);
    return`<button class="ptab${i===0?' on':''}" data-ph="${ph.id}" style="--pc:${ph.color}" onclick="scrollToPhase('${ph.id}')">
      <span class="ptab-ic">${ph.icon}</span>
      <div>
        <div class="ptab-n">${ph.name}</div>
        <div class="ptab-s">${ph.range} · ${c.d}/${c.t}</div>
        <div class="ptab-b"><div class="ptab-f" style="width:${p_}%;background:${ph.color}"></div></div>
      </div>
    </button>`;
  }).join('');
}

let tt;
function showToast(m){const el=document.getElementById('toast');document.getElementById('tMsg').textContent=m;el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2000)}
function toggleT(id){S[id]=!S[id];saveS();render();buildTabs();if(S[id])showToast('Task complete \u2713')}

loadS();
render();
buildTabs();

</script>
</body>
</html>
