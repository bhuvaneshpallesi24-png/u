<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Viewer · Knowledge Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0c10;
      --surface: #111419;
      --surface2: #181c24;
      --border: rgba(255,255,255,0.07);
      --accent: #00e5a0;
      --accent2: #6c63ff;
      --text: #e8eaf0;
      --text-muted: #5a6070;
      --text-dim: #8892a0;
      --sidebar-w: 260px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
    }

    .layout {
      display: flex;
      height: 100vh;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .sidebar::before {
      content: '';
      position: absolute;
      top: -80px; left: -80px;
      width: 220px; height: 220px;
      background: radial-gradient(circle, rgba(0,229,160,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .sidebar-header {
      padding: 24px 20px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
      text-decoration: none;
    }

    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .logo-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 0.08em;
      margin-left: 42px;
    }

    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0;
    }

    .sidebar-nav::-webkit-scrollbar { width: 3px; }
    .sidebar-nav::-webkit-scrollbar-track { background: transparent; }
    .sidebar-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    .section-group { margin-bottom: 4px; }

    .section-label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      color: var(--text-dim);
      text-decoration: none;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 400;
      transition: all 0.18s ease;
      border-left: 2px solid transparent;
    }

    .nav-link::before {
      content: '›';
      font-size: 14px;
      color: var(--text-muted);
      transition: all 0.18s ease;
    }

    .nav-link:hover,
    .nav-link.active {
      color: var(--text);
      background: rgba(255,255,255,0.04);
      border-left-color: var(--accent);
      padding-left: 24px;
    }

    .nav-link:hover::before,
    .nav-link.active::before { color: var(--accent); }

    .nav-link.active {
      color: var(--accent);
      background: rgba(0,229,160,0.06);
    }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .status-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── RIGHT PANEL ── */
    .right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      height: 100vh;
    }

    /* Viewer toolbar */
    .viewer-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text-dim);
      text-decoration: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      transition: all 0.18s ease;
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border-color: rgba(255,255,255,0.14);
    }

    .file-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
    }

    .file-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    .file-name {
      color: var(--text);
      font-weight: 600;
    }

    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tool-btn {
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      text-decoration: none;
      transition: all 0.18s ease;
    }

    .tool-btn:hover {
      background: rgba(255,255,255,0.08);
      color: var(--text);
    }

    /* iframe wrapper */
    .iframe-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Loading overlay */
    .loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      gap: 16px;
      transition: opacity 0.4s ease;
    }

    .loading-overlay.hidden { opacity: 0; pointer-events: none; }

    .spinner {
      width: 36px; height: 36px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <a href="/" class="logo-row" style="text-decoration:none;">
        <div class="logo-icon">📚</div>
        <div class="logo-text">Knowledge Hub</div>
      </a>
      <div class="logo-sub">~/personal/reference</div>
    </div>

    <nav class="sidebar-nav">
      {% for section, subs in sections.items() %}
      <div class="section-group">
        <div class="section-label">{{ section }}</div>
        {% for sub, f in subs.items() %}
        <a href="/view/{{ section }}/{{ sub }}"
           class="nav-link {% if f == file %}active{% endif %}">
          {{ sub }}
        </a>
        {% endfor %}
      </div>
      {% endfor %}
    </nav>

    <div class="sidebar-footer">
      <span class="status-dot"></span>local · port 5000
    </div>
  </aside>

  <!-- RIGHT PANEL -->
  <div class="right-panel">

    <!-- Toolbar -->
    <div class="viewer-toolbar">
      <div class="toolbar-left">
        <a href="/" class="back-btn">← home</a>
        <div class="file-pill">
          <div class="file-dot"></div>
          <span>static/html/</span><span class="file-name">{{ file }}</span>
        </div>
      </div>
      <div class="toolbar-right">
        <a href="/static/html/{{ file }}" target="_blank" class="tool-btn" title="Open in new tab">↗</a>
      </div>
    </div>

    <!-- Content -->
    <div class="iframe-wrapper">
      <div class="loading-overlay" id="loader">
        <div class="spinner"></div>
        <div class="loading-text">Loading {{ file }}…</div>
      </div>
      <iframe src="/static/html/{{ file }}"
              onload="document.getElementById('loader').classList.add('hidden')">
      </iframe>
    </div>

  </div>
</div>

</body>
</html>
