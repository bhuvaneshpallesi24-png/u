<!DOCTYPE html>
<html>
<head>
    <title>Viewer</title>
    <style>
        body {
            margin: 0;
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: #111;
            color: white;
            padding: 10px;
            overflow-y: auto;
        }

        .sidebar a {
            color: #ccc;
            display: block;
            padding: 5px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #444;
        }

        .content {
            flex: 1;
            height: 100vh;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>📚 Dashboard</h2>

    {% for section, subs in sections.items() %}
        <h3>{{ section }}</h3>
        {% for sub, file in subs.items() %}
            <a href="/view/{{ section }}/{{ sub }}">{{ sub }}</a>
        {% endfor %}
    {% endfor %}
</div>

<!-- Content -->
<div class="content">
    <iframe src="/static/html/{{ file }}"></iframe>
</div>

</body>
</html>
