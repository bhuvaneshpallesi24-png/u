<!DOCTYPE html>
<html>
<head>
    <title>My Knowledge Hub</title>
    <style>
        body { display: flex; margin: 0; font-family: Arial; }
        .sidebar {
            width: 250px;
            background: #111;
            color: white;
            height: 100vh;
            padding: 10px;
        }
        .sidebar h3 { margin-top: 20px; }
        .sidebar a {
            color: #ccc;
            display: block;
            padding: 5px;
            text-decoration: none;
        }
        .sidebar a:hover { background: #444; }

        .content {
            flex: 1;
            padding: 20px;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h2>📚 My Dashboard</h2>

    {% for section, subs in sections.items() %}
        <h3>{{ section }}</h3>
        {% for sub, file in subs.items() %}
            <a href="/view/{{ section }}/{{ sub }}">{{ sub }}</a>
        {% endfor %}
    {% endfor %}
</div>

<div class="content">
    <h1>Welcome 🚀</h1>
    <p>Select a section from sidebar</p>
</div>

</body>
</html>
